site_name: KidCe FPV
site_description: FPV racing, builds, repairs and notes by KidCe
site_url: https://kidce.github.io/FPVWiki/
repo_url: https://github.com/KidCe/FPVWiki
repo_name: KidCe/FPVWiki

theme:
  name: material
  language: en
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: fpv-light
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: fpv-dark
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips

plugins:
  - search:
      lang: en
  - blog:
      blog_dir: artikel
      post_dir: artikel/posts
      archive: true
      archive_name: Archive
      categories: true
      categories_name: Topics
      pagination_per_page: 6

nav:
  - Home: index.md
  - Articles:
      - artikel/index.md
  - Builds:
      - Overview: builds/index.md
      - Budget Build: builds/budget-build.md
      - 2026 Racing Setup: builds/2026-racing-setup.md
      - DJI O4 Build: builds/dji-o4-build.md
      - Analog Build: builds/analog-build.md
  - Projects:
      - Overview: projects/index.md
      - Addressable Balancer LEDs: projects/addressable-balancer-leds.md
      - Aichtal Foldable PPR Gates: projects/aichtal-foldable-ppr-gates.md
      - MultiGP Champs 2026 Gates: projects/multigp-champs-2026-gates.md
      - 3.5-inch 1S Endurance Drone: projects/35-inch-1s-endurance-drone.md
  - Wiki:
      - Overview: wiki/index.md
      - Fundamentals:
          - Understanding rates: wiki/grundlagen/rates.md
          - ESC capacitors: wiki/grundlagen/esc-capacitors.md
      - Repairs:
          - Happymodel 2G4: wiki/reparaturen/happymodel-2g4.md
  - About:
      - About me: ueber-mich.md
      - Race results: race-results.md
      - "My Squad - Holy*s*quad": my-squad.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/KidCe
      name: KidCe on GitHub
  generator: false

copyright: © 2026 KidCe · Built with MkDocs Material
