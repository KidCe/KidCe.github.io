site_name: KidCe FPV
site_description: FPV racing, builds, repairs and notes by KidCe
site_author: Nikos Kitsikoudis
site_url: https://kidce.github.io/
repo_url: https://github.com/KidCe/KidCe.github.io
repo_name: KidCe/KidCe.github.io

theme:
  name: material
  language: en
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    scheme: fpv-light
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips

plugins:
  - search:
      lang: en
  - blog:
      blog_dir: articles
      post_dir: articles/posts
      archive: true
      archive_name: Archive
      categories: true
      categories_name: Topics
      pagination_per_page: 6
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      zoomable: true
      draggable: true
      auto_caption: true
      caption_position: bottom
      skip_classes:
        - no-lightbox
  - rss:
      match_path: articles/posts/.*
      date_from_meta:
        as_creation: date
      categories:
        - categories
  - social:
      enabled: !ENV [CI, false]
      cards_layout: default
      cards_layout_options:
        background_color: "#15171b"
        color: "#ffffff"

nav:
  - Home: index.md
  - Articles:
      - articles/index.md
  - Builds:
      - Overview: builds/index.md
      - Budget Build: builds/budget-build.md
      - 2026 Racing Setup: builds/2026-racing-setup.md
      - DJI O4 Build: builds/dji-o4-build.md
      - Analog Build: builds/analog-build.md
  - Projects:
      - Overview: projects/index.md
      - Addressable Balancer LEDs: projects/addressable-balancer-leds.md
      - Aichtal Foldable PPR Gates: projects/aichtal-foldable-ppr-gates.md
      - MultiGP Champs 2026 Gates: projects/multigp-champs-2026-gates.md
      - 3.5-inch 1S Endurance Drone: projects/35-inch-1s-endurance-drone.md
  - Wiki:
      - Overview: wiki/index.md
      - Fundamentals:
          - Understanding rates: wiki/fundamentals/rates.md
          - ESC capacitors: wiki/fundamentals/esc-capacitors.md
      - Repairs:
          - Happymodel 2G4: wiki/repairs/happymodel-2g4.md
  - About:
      - About me: about-me.md
      - Race results: race-results.md
      - "My Squad - Holy*s*quad": my-squad.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js
  - assets/javascripts/race-performance-chart.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/KidCe
      name: KidCe on GitHub
    - icon: fontawesome/solid/rss
      link: https://kidce.github.io/feed_rss_created.xml
      name: Subscribe to new articles
  generator: false

copyright: © 2026 KidCe · Built with MkDocs Material
